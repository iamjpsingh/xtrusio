name: xtrusio

# Local dev runs against managed Supabase (supabase.com) — there is no
# local Postgres / GoTrue / Realtime / Storage / Studio container. The
# only optional local dependency is Redis, used by arq workers. A remote
# Redis (e.g. Upstash) works the same; running locally is just convenient.

networks:
  xtrusio-net:
    name: xtrusio-net
    driver: bridge

services:
  redis:
    container_name: xtrusio-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - xtrusio-net
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - xtrusio-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xtrusio-redis-data:
    name: xtrusio-redis-data
