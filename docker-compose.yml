name: xtrusio

# Postgres + Auth + Realtime are provided by managed Supabase (project URL in
# .env). This file owns only the local infra that isn't part of Supabase —
# currently just Valkey for caches/queues.
#
# Networking: no host ports are published. Reach services from the host via
# OrbStack DNS — `xtrusio-valkey.orb.local:6379` resolves to the container's
# internal port. This guarantees zero conflict with other local Docker stacks.
# (Docker Desktop users without DNS would need to add a `ports:` mapping.)

networks:
  xtrusio-net:
    name: xtrusio-net
    driver: bridge

services:
  valkey:
    container_name: xtrusio-valkey
    image: valkey/valkey:8
    restart: unless-stopped
    networks:
      - xtrusio-net
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - xtrusio-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      com.xtrusio.stack: "true"
      com.xtrusio.role: "cache"

volumes:
  xtrusio-valkey-data:
    name: xtrusio-valkey-data
