name: xtrusio

# Note: Postgres + GoTrue + Realtime + PostgREST + Studio are managed by the
# Supabase CLI (`supabase start`), which spawns its own Docker containers on
# its own internal network. This file owns ONLY services that Supabase CLI
# does not provide — currently just Valkey for caches/queues.

networks:
  xtrusio-net:
    name: xtrusio-net
    driver: bridge

services:
  valkey:
    container_name: xtrusio-valkey
    image: valkey/valkey:8
    restart: unless-stopped
    networks:
      - xtrusio-net
    ports:
      # Host:Container — non-default host port to avoid colliding with other Redis/Valkey
      - "63792:6379"
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - xtrusio-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xtrusio-valkey-data:
    name: xtrusio-valkey-data
