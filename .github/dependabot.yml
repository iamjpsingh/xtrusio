version: 2
updates:
  # --- Python (FastAPI backend) -------------------------------------------
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  # --- JS / TS (pnpm workspace) -------------------------------------------
  # The root manifest + per-workspace manifests. pnpm is a first-class
  # ecosystem; Dependabot resolves against pnpm-lock.yaml.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript

  - package-ecosystem: npm
    directory: /packages/api-types
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript

  - package-ecosystem: npm
    directory: /packages/ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript

  # --- GitHub Actions ------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
