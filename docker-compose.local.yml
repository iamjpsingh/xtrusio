name: xtrusio-local

# OPT-IN local Postgres for contributors who can't / won't provision a managed
# Supabase project (PAR-F F.10 / L13). The DEFAULT dev runtime is managed
# Supabase — see ENGINEERING_PRINCIPLES §8a. This file is NOT part of `make dev`.
#
# What it gives you: a throwaway Postgres with the same extensions the project
# needs (pgcrypto, citext, vector) and a minimal `auth.users` stub, so you can
# run `make migrate` and the Supabase-free test subset locally.
#
# What it does NOT give you: Supabase's GoTrue (`auth`), real JWT/JWKS, or
# Realtime. The Supabase-dependent tests and the full auth flow still need a
# managed project. Point DATABASE_URL at this container, e.g.:
#   DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/postgres
#
# Boot it with `make dev-local`.

services:
  postgres-local:
    container_name: xtrusio-postgres-local
    # pgvector image == postgres:16 + the `vector` extension migration 0000
    # creates. Plain postgres:16 lacks `vector`.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      # 5433 on the host to avoid clashing with any host-local Postgres on 5432.
      - "5433:5432"
    volumes:
      - xtrusio-postgres-local-data:/var/lib/postgresql/data
      # Run once on first init: create extensions + the auth.users stub so
      # migrations targeting auth.users(id) resolve.
      - ./.github/ci/ephemeral-db-bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      com.xtrusio.stack: "true"
      com.xtrusio.role: "db-local"

volumes:
  xtrusio-postgres-local-data:
    name: xtrusio-postgres-local-data
